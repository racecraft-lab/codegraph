# SPEC-005 Local HTTP Server & REST API — shipped OpenAPI contract (FR-025).
# Copied/adapted from the design source specs/005-local-http-server/contracts/openapi.yaml.
# Slice 1 shipped the read-tagged paths; Slice 2 (task T041) adds the /api/reindex
# jobs surface (tag "jobs") + its jobs-only schemas (Job/SyncModeResult/
# FullModeResult) and the RepoId path param. The jobs POST/GET run wholly in the
# serve process against the in-memory job registry (no daemon forwarding at
# request time), so — unlike the read paths — they carry NO 503 `unavailable`.
# copy-assets copies this into dist/server/ so it ships (Constitution VII); the
# contract test walks it against a running fixture server (fails on any
# undocumented route or mismatched shape).
openapi: 3.1.0
info:
  title: CodeGraph Local API
  version: 0.0.0   # placeholder; the running server reports its real version via GET /api/status (FR-016, no URL /v1)
  description: >
    Local, loopback-first REST surface over the per-project daemon index
    (`codegraph serve --web`). Same-origin only (no CORS, FR-019). Auth applies
    only to non-loopback binds (FR-012/013/014): with defaults the server binds
    127.0.0.1 and serves /api/* with no credentials.
servers:
  - url: http://127.0.0.1:11235
    description: Default loopback bind (port overridable via --port / --port 0)

tags:
  - name: read     # Slice 1
  - name: jobs     # Slice 2
  - name: chat     # SPEC-006

# Bearer auth applies ONLY when a token is configured for a non-loopback bind
# (FR-014); the loopback-default bind enforces no auth and serves /api/* with no
# credentials — which is the contract every path below is walked against. The
# top-level `security` below makes auth OPTIONAL (the empty `{}` = the no-auth
# loopback default; `bearerAuth` = a token-bound non-loopback bind), documenting
# the scheme without a per-operation 401: the token-bound 401 surface (FR-014)
# and the Host-header 400 gate are covered by
# __tests__/server-auth-binding.test.ts, and the top-level 500 catch is FR-015a.
security:
  - {}                 # loopback default: no credentials required (FR-012/013)
  - bearerAuth: []     # non-loopback bind requires a valid Bearer token (FR-014)
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer }
  parameters:
    RepoId:
      name: repo
      in: path
      required: true
      description: >
        16-hex repo id (SHA-256 prefix of the realpath'd root, FR-010). A
        malformed id (fails the pattern) => 404 not_found (details.resource:
        repo), never 400 (FR-011).
      schema: { type: string, pattern: '^[0-9a-f]{16}$' }
    NodeId:
      name: id
      in: path
      required: true
      description: >
        Opaque node id, percent-encoded (literal '/' as %2F, FR-004a). Shapes:
        '<kind>:<32hex>' or 'file:<relative/posix/path>'. Resolved only as an
        opaque DB key, never a filesystem path.
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, default: 100, minimum: 1, maximum: 500 }
      description: Page size; default 100, clamped to 500 (over-cap clamps, not errors — FR-006).
    Offset:
      name: offset
      in: query
      schema: { type: integer, default: 0, minimum: 0 }
    MinSize:
      name: minSize
      in: query
      schema: { type: integer, default: 1, minimum: 1 }
      description: 'SPEC-011 (FR-029) — minimum member-file count; default 1, values <1 clamp to 1 (coerced, never a 4xx). minSize>=2 suppresses singleton clusters.'
    RepoQuery:
      name: repo
      in: query
      required: false
      description: >
        Optional 16-hex repo id (FR-010/010a) selecting the target repo on a
        repo-scoped read; omitted => the default (startup) repo. Unregistered or
        malformed => 404 not_found (details.resource: repo), never 400 (FR-011).
        First access lazily attaches that repo's daemon (Q2). Not accepted by
        /api/status or /api/repos.
      schema: { type: string, pattern: '^[0-9a-f]{16}$' }
  schemas:
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              enum: [invalid_request, unauthorized, not_found, conflict, unavailable, internal]
            message: { type: string, description: Generic, whitelisted text — never raw exceptions/paths (FR-015a). }
            details:
              type: object
              description: 'Whitelisted fields only, e.g. { resource: node|repo|route } for not_found.'
    Node:
      type: object
      required: [id, kind, name]
      properties:
        id: { type: string }
        kind: { type: string }
        name: { type: string }
        file: { type: string }
        line: { type: integer }
        signature: { type: string }
        doc: { type: string }
    Edge:
      type: object
      required: [source, target, kind]
      properties:
        source: { type: string }
        target: { type: string }
        kind: { type: string }
        provenance: { type: string, enum: [static, heuristic] }
    ListResult:
      type: object
      required: [items, total, limit, offset]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/Node' } }
        total: { type: integer, description: 'Match count. For /api/search this is capped at the search scan ceiling (500) — clients MUST treat the search total as min(matches, 500) (FR-006).' }
        limit: { type: integer, description: Effective (clamped) page size. }
        offset: { type: integer }
    Repo:
      type: object
      required: [id, root, name, default]
      properties:
        id: { type: string }
        root: { type: string }
        name: { type: string }
        default: { type: boolean }
    Status:
      type: object
      required: [version, repo, index]
      properties:
        version: { type: string }
        repo:
          type: object
          required: [id, root, name]
          properties:
            id: { type: string }
            root: { type: string }
            name: { type: string }
        index:
          type: object
          required: [state, fileCount, nodeCount, edgeCount]
          properties:
            state: { type: string }
            fileCount: { type: integer }
            nodeCount: { type: integer }
            edgeCount: { type: integer }
            lastIndexed: { type: ['string', 'null'], description: 'ISO-8601 timestamp of the last index, or null for a never-indexed repo.' }
        hybridSearch:
          type: object
          properties:
            available: { type: boolean }
            reason: { type: string }
        lsp:
          type: object
          properties:
            available: { type: boolean }
    SearchResult:
      allOf:
        - $ref: '#/components/schemas/ListResult'
        - type: object
          required: [degraded]   # the server ALWAYS returns degraded (FR-006a)
          properties:
            degraded: { type: boolean, description: True when a semantic/hybrid/auto search fell back to keyword (FR-006a). }
            degradationReason: { type: string }
    GraphResult:
      type: object
      required: [nodes, edges, truncated]
      properties:
        nodes: { type: array, items: { $ref: '#/components/schemas/Node' } }
        edges: { type: array, items: { $ref: '#/components/schemas/Edge' } }
        truncated: { type: boolean, description: 'True when the node cap was hit — 2000 nodes for /api/graph (FR-007); /api/impact shares this subgraph shape and flags truncation of its own capped traversal (FR-004).' }
    Job:
      type: object
      required: [id, repo, mode, status, startedAt]
      properties:
        id: { type: string, description: crypto.randomUUID(). }
        repo: { type: string }
        mode: { type: string, enum: [sync, full] }
        status: { type: string, enum: [running, done, error] }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time }
        reason:
          type: string
          enum: [aborted, lock_unavailable, index_failed]
          description: 'On error: the whitelisted terminal reason — aborted | lock_unavailable | index_failed (a contained extraction failure, never raw text — FR-015a/021/021a/023).'
        result:
          description: Present on terminal done (and a partial full). Discriminated on `mode` (FR-023/024).
          oneOf:
            - $ref: '#/components/schemas/SyncModeResult'
            - $ref: '#/components/schemas/FullModeResult'
    SyncModeResult:   # mode: "sync" (FR-023/024, D3 — changedFilePaths dropped per FR-015a)
      type: object
      required: [filesChecked, filesAdded, filesModified, filesRemoved, nodesUpdated, durationMs]
      properties:
        filesChecked: { type: integer }
        filesAdded: { type: integer }
        filesModified: { type: integer }
        filesRemoved: { type: integer }
        nodesUpdated: { type: integer }
        durationMs: { type: integer }
    FullModeResult:   # mode: "full" (FR-023/024, D3 — raw errors[] dropped per FR-015a)
      type: object
      required: [success, filesIndexed, filesSkipped, filesErrored, nodesCreated, edgesCreated, durationMs]
      properties:
        success: { type: boolean }
        filesIndexed: { type: integer }
        filesSkipped: { type: integer }
        filesErrored: { type: integer }
        filesDiscovered: { type: integer, description: 'Ground-truth scan count; shortfall ⇒ partial index.' }
        nodesCreated: { type: integer }
        edgesCreated: { type: integer }
        durationMs: { type: integer }
    # ---------- SPEC-011: execution-flow catalog (FR-028/028a) ----------
    FlowTruncation:   # the FR-027 axis-flag shape; each axis independent
      type: object
      required: [depth, width, totalSteps]
      properties:
        depth: { type: boolean }
        width: { type: boolean }
        totalSteps: { type: boolean }
    FlowStep:
      type: object
      required: [nodeId, name, kind, depth, parentNodeId, edgeKind, provenance]
      properties:
        nodeId: { type: string }
        name: { type: string, description: 'Denormalized symbol name (FR-022a); an explicit placeholder if the node id no longer resolves.' }
        kind: { type: string }
        depth: { type: integer, description: 'Hops from the root (0 = root).' }
        parentNodeId: { type: ['string', 'null'], description: 'Edge source in the branching graph; null for the root step.' }
        edgeKind: { type: ['string', 'null'], enum: [calls, references, null], description: 'null for the root step.' }
        # STANDALONE 3-value enum — MUST NOT $ref Edge.provenance, whose 2-value
        # [static, heuristic] would collapse lsp→static and drop the LSP provenance
        # FR-008/FR-009 require. Nullable ONLY for the root step (3.1 type union).
        provenance:
          type: ['string', 'null']
          enum: [static, lsp, heuristic, null]
          description: 'Provenance of the incoming call edge (static | lsp | heuristic); null ONLY for the root step (FR-009).'
    FlowSummary:
      type: object
      required: [id, name, entryKind, stepCount, truncated]
      properties:
        id: { type: string, description: 'Deterministic, root-derived flow id (FR-017a).' }
        name: { type: string, description: '"<METHOD> <path>" | CLI command | qualified root symbol (FR-010).' }
        entryKind: { type: string, enum: [route, cli, event, export] }
        stepCount: { type: integer }
        truncated: { type: boolean, description: 'depth OR width OR totalSteps (FR-027).' }
    FlowDetail:
      type: object
      required: [id, name, entryKind, root, steps, truncated, truncation, sourceVersion, state]
      properties:
        id: { type: string }
        name: { type: string }
        entryKind: { type: string, enum: [route, cli, event, export] }
        root:
          type: object
          required: [nodeId, name, kind]
          properties:
            nodeId: { type: string }
            name: { type: string }
            kind: { type: string }
        steps: { type: array, items: { $ref: '#/components/schemas/FlowStep' } }
        truncated: { type: boolean, description: 'Disjunction of the three axis flags (FR-027).' }
        truncation: { $ref: '#/components/schemas/FlowTruncation' }
        sourceVersion: { type: integer, description: 'graph_write_version the catalog was computed from.' }
        state: { type: string, enum: [available, stale, empty, unavailable, disabled, not_indexed] }
    FlowListResult:   # a paged flow catalog defined DIRECTLY — NOT `allOf ListResult`, whose items are Node[]: a catalog item is a FlowSummary, so `allOf` forced items to satisfy BOTH shapes and validated nothing real.
      type: object
      required: [items, total, limit, offset, sourceVersion, state]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/FlowSummary' } }
        total: { type: integer, description: Match count. }
        limit: { type: integer, description: Effective (coerced) page size. }
        offset: { type: integer, description: Effective (coerced) offset. }
        sourceVersion: { type: integer, description: 'graph_write_version the catalog was computed from (0 when not_indexed).' }
        state: { type: string, enum: [available, stale, empty, unavailable, disabled, not_indexed] }
    # ---------- SPEC-011: functional-cluster catalog (FR-028/028a/029) ----------
    ClusterSummary:   # field names IDENTICAL to the codegraph_list_clusters MCP item (FR-028a)
      type: object
      required: [id, canonicalLabel, displayLabel, memberCount, isSingleton]
      properties:
        id: { type: string, description: 'Opaque, deterministic, stable cluster id (FR-017a).' }
        canonicalLabel: { type: string, description: 'Deterministic label from dominant directory + name tokens (FR-018).' }
        displayLabel: { type: ['string', 'null'], description: 'Optional LLM label, presentation-only; null when unconfigured (FR-019).' }
        memberCount: { type: integer }
        isSingleton: { type: boolean, description: 'True for a single-file cluster (FR-014).' }
    ClusterListResult:   # a paged cluster catalog defined DIRECTLY — NOT `allOf ListResult` (whose items are Node[]); see FlowListResult.
      type: object
      required: [items, total, limit, offset, sourceVersion, state]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ClusterSummary' } }
        total: { type: integer, description: Post-minSize-filter match count. }
        limit: { type: integer, description: Effective (coerced) page size. }
        offset: { type: integer, description: Effective (coerced) offset. }
        sourceVersion: { type: integer, description: 'graph_write_version the catalog was computed from (0 when not_indexed).' }
        state: { type: string, enum: [available, stale, empty, unavailable, disabled, not_indexed] }
    CatalogMiss:   # success-shaped guidance for /api/flows/{id}: an unknown id within a live catalog, or an inert (disabled/unavailable/not_indexed) catalog (FR-030).
      type: object
      required: [found, state, message]
      properties:
        found: { type: boolean, enum: [false] }
        state: { type: string, enum: [available, stale, empty, unavailable, disabled, not_indexed] }
        message: { type: string }
    ChatStatus:
      type: object
      required: [state, message, providerConfigured, repo]
      properties:
        state: { type: string, enum: [enabled, dormant, misconfigured, disabled, rate_limited] }
        message: { type: string }
        providerConfigured: { type: boolean }
        repo: { type: string }
    ChatRequest:
      type: object
      required: [message]
      properties:
        repo: { type: string, description: Optional 16-hex repo id; omitted uses the startup repo. }
        message: { type: string, minLength: 1 }
        selectedNodeId: { type: string }
        view: { type: string }
    ChatResponse:
      type: object
      required: [state]
      properties:
        state: { type: string, enum: [answer, fallback, pending_bundle, dormant, misconfigured, rate_limited, error] }
        answer: { type: string }
        bundleHandle: { type: string }
        message: { type: string }
        citations:
          type: array
          items:
            type: object
            properties:
              nodeId: { type: string }
              file: { type: string }
              line: { type: integer }
  responses:
    NotFound:
      description: Unknown node/repo/route (FR-011/015a); details.resource discriminates.
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }
    Unavailable:
      description: Daemon attach/spawn failure — transient (FR-015a).
      headers:
        Retry-After: { schema: { type: integer }, description: Seconds to wait before retry. }
      content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }

paths:
  # ---------- Slice 1: read API ----------
  /api/status:
    get:
      tags: [read]
      summary: Server + index health (the version channel, FR-005/016). Not repo-scoped — reports the default repo.
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Status' } } } }
        '503': { $ref: '#/components/responses/Unavailable' }      # default-repo daemon attach/spawn failure (FR-015a + Edge Cases)
  /api/repos:
    get:
      tags: [read]
      summary: Indexed projects from the daemon registry; startup repo is default (FR-009).
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Repo' } } } }
  /api/search:
    get:
      tags: [read]
      summary: Symbol search (FR-004/006/006a).
      parameters:
        - { name: q, in: query, required: true, schema: { type: string, minLength: 1 }, description: 'Required search text (FR-006a); absent or empty ⇒ 400.' }
        - name: mode
          in: query
          description: Defaults to `auto` only when omitted; an invalid value ⇒ 400 (FR-006a).
          schema: { type: string, enum: [keyword, semantic, hybrid, auto] }
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
        - $ref: '#/components/parameters/RepoQuery'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/SearchResult' } } } }
        '400': { description: Absent/empty q, invalid mode, or malformed limit/offset (FR-006a/015a), content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
        '404': { $ref: '#/components/responses/NotFound' }         # unknown/malformed ?repo (FR-010a/011)
        '503': { $ref: '#/components/responses/Unavailable' }      # daemon attach/spawn failure (FR-015a + Edge Cases)
  /api/node/{id}:
    get:
      tags: [read]
      summary: Node's own fields only; relationships via the paged endpoints (FR-004/004a).
      parameters: [ { $ref: '#/components/parameters/NodeId' }, { $ref: '#/components/parameters/RepoQuery' } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Node' } } } }
        '404': { $ref: '#/components/responses/NotFound' }         # unknown/malformed node id or ?repo (FR-004a/010a/011)
        '503': { $ref: '#/components/responses/Unavailable' }      # daemon attach/spawn failure (FR-015a + Edge Cases)
  /api/callers/{id}:
    get:
      tags: [read]
      summary: Callers of a symbol, paged (FR-004/006).
      parameters:
        - { $ref: '#/components/parameters/NodeId' }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
        - { $ref: '#/components/parameters/RepoQuery' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ListResult' } } } }
        '400': { description: Malformed/negative limit or offset (FR-015a; over-cap clamps, not errors), content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
        '404': { $ref: '#/components/responses/NotFound' }         # unknown/malformed node id or ?repo (FR-004a/010a/011)
        '503': { $ref: '#/components/responses/Unavailable' }      # daemon attach/spawn failure (FR-015a + Edge Cases)
  /api/callees/{id}:
    get:
      tags: [read]
      summary: Callees of a symbol, paged (FR-004/006).
      parameters:
        - { $ref: '#/components/parameters/NodeId' }
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
        - { $ref: '#/components/parameters/RepoQuery' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ListResult' } } } }
        '400': { description: Malformed/negative limit or offset (FR-015a; over-cap clamps, not errors), content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
        '404': { $ref: '#/components/responses/NotFound' }         # unknown/malformed node id or ?repo (FR-004a/010a/011)
        '503': { $ref: '#/components/responses/Unavailable' }      # daemon attach/spawn failure (FR-015a + Edge Cases)
  /api/impact/{id}:
    get:
      tags: [read]
      summary: Impact radius of a symbol — a node+edge subgraph, NOT a paged list (FR-004; library getImpactRadius returns a Subgraph). Shares GraphResult's shape + node cap.
      parameters:
        - { $ref: '#/components/parameters/NodeId' }
        - name: depth
          in: query
          schema: { type: integer, default: 3, minimum: 1, maximum: 3 }
          description: Impact's own natural default 3 (library getImpactRadius maxDepth=3), NOT the neighborhood default of 1; over-max clamps, not errors (FR-004/015a).
        - { $ref: '#/components/parameters/RepoQuery' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/GraphResult' } } } }
        '400': { description: Malformed/negative depth (FR-015a; over-max clamps, not errors), content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
        '404': { $ref: '#/components/responses/NotFound' }         # unknown/malformed node id or ?repo (FR-004a/010a/011)
        '503': { $ref: '#/components/responses/Unavailable' }      # daemon attach/spawn failure (FR-015a + Edge Cases)
  /api/graph/{id}:
    get:
      tags: [read]
      summary: Graph neighborhood; depth default 1 / max 3; node cap 2000 + truncated (FR-007).
      parameters:
        - { $ref: '#/components/parameters/NodeId' }
        - name: depth
          in: query
          schema: { type: integer, default: 1, minimum: 1, maximum: 3 }
          description: Over-cap clamps, not errors (FR-007/015a).
        - $ref: '#/components/parameters/RepoQuery'
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/GraphResult' } } } }
        '400': { description: Malformed/negative depth (FR-015a; over-max clamps, not errors), content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
        '404': { $ref: '#/components/responses/NotFound' }         # unknown/malformed node id or ?repo (FR-004a/010a/011)
        '503': { $ref: '#/components/responses/Unavailable' }      # daemon attach/spawn failure (FR-015a + Edge Cases)

  # ---------- SPEC-011: execution-flow catalog (FR-027/028/030) ----------
  # Daemon-forwarding reads (like the Slice-1 reads above), so they carry the
  # same 503. An unknown FLOW id is NOT a 404 — it returns a success-shaped 200
  # to keep this surface's condition-handling identical to the MCP tools (FR-030).
  /api/flows:
    get:
      tags: [read]
      summary: Paged execution-flow catalog with read-time state (SPEC-011, FR-027/028/030).
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
        - { $ref: '#/components/parameters/RepoQuery' }
      responses:
        # No 400 on paging: `limit`/`offset` are COERCED (floor + clamp; malformed/
        # missing → default), never a 4xx (FR-030) — matching the MCP tool, unlike
        # the SPEC-005 reads. Only a bad ?repo (404) or a daemon fault (503) is non-2xx.
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/FlowListResult' } } } }
        '404': { $ref: '#/components/responses/NotFound' }         # unknown/malformed ?repo (FR-010a/011)
        '503': { $ref: '#/components/responses/Unavailable' }      # daemon attach/spawn failure (FR-015a + Edge Cases)
  /api/flows/{id}:
    get:
      tags: [read]
      summary: One flow's bounded graph + truncation. Unknown flow id ⇒ success-shaped 200 (not 404), matching the MCP contract (FR-030).
      parameters:
        - { name: id, in: path, required: true, schema: { type: string }, description: 'The deterministic flow id from /api/flows.' }
        - { $ref: '#/components/parameters/RepoQuery' }
      responses:
        '200': { description: 'OK — the flow detail, or success-shaped guidance (found:false) for an unknown id / disabled / unavailable / not-indexed catalog (FR-030).', content: { application/json: { schema: { oneOf: [{ $ref: '#/components/schemas/FlowDetail' }, { $ref: '#/components/schemas/CatalogMiss' }] } } } }
        '404': { $ref: '#/components/responses/NotFound' }         # unknown/malformed ?repo (FR-010a/011) — NOT unknown flow id
        '503': { $ref: '#/components/responses/Unavailable' }      # daemon attach/spawn failure (FR-015a + Edge Cases)
  /api/clusters:
    get:
      tags: [read]
      summary: Paged functional-cluster catalog with read-time state (SPEC-011, FR-028/029/030).
      parameters:
        - { $ref: '#/components/parameters/Limit' }
        - { $ref: '#/components/parameters/Offset' }
        - { $ref: '#/components/parameters/MinSize' }
        - { $ref: '#/components/parameters/RepoQuery' }
      responses:
        # No 400 on paging: `limit`/`offset`/`minSize` are COERCED (floor + clamp;
        # malformed/missing → default), never a 4xx (FR-029/030) — matching the MCP
        # tool. Only a bad ?repo (404) or a daemon fault (503) is non-2xx.
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ClusterListResult' } } } }
        '404': { $ref: '#/components/responses/NotFound' }         # unknown/malformed ?repo (FR-010a/011)
        '503': { $ref: '#/components/responses/Unavailable' }      # daemon attach/spawn failure (FR-015a + Edge Cases)

  # ---------- SPEC-006: same-origin browser chat adapter over SPEC-018 ----------
  /api/chat/status:
    get:
      tags: [chat]
      summary: Backend-only LLM/chat readiness for the browser UI; no provider secrets are returned.
      parameters:
        - { $ref: '#/components/parameters/RepoQuery' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ChatStatus' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/chat/messages:
    post:
      tags: [chat]
      summary: Ask a graph-grounded question through the local backend; provider calls, if any, happen server-side.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ChatRequest' }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/ChatResponse' } } } }
        '400': { description: Malformed JSON body or missing message, content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/chat/bundles/{handle}:
    get:
      tags: [chat]
      summary: Redeem or inspect an agent-mode bundle handle emitted by /api/chat/messages.
      parameters:
        - name: handle
          in: path
          required: true
          schema: { type: string }
        - { $ref: '#/components/parameters/RepoQuery' }
      responses:
        '200': { description: Completed answer or pending bundle state, content: { application/json: { schema: { $ref: '#/components/schemas/ChatResponse' } } } }
        '404': { $ref: '#/components/responses/NotFound' }

  # ---------- Slice 2: re-index jobs (T041) ----------
  # These handlers run wholly in the serve process against the in-memory job
  # registry (no daemon forwarding at request time), so — unlike every read path
  # above — they carry NO 503 `unavailable`.
  /api/reindex/{repo}:
    post:
      tags: [jobs]
      summary: Start a re-index job — sync default, ?full=true rebuild (FR-020). Registry repos only; never inits.
      # No requestBody: parameters are URL-only (:repo + ?full, FR-020). The server does not read/require a
      # request body, so a malformed/oversized body cannot parse-error or stall the handler (spec Edge Cases).
      parameters:
        - { $ref: '#/components/parameters/RepoId' }
        - name: full
          in: query
          description: >-
            Only the literal `?full=true` escalates to a full rebuild; any other
            value (or omitted) is an incremental sync (FR-020). Coerced, not
            strictly validated — no 400, unlike the search `mode` enum (FR-006a).
          schema: { type: boolean, default: false }
      responses:
        '202':
          description: Job started; descriptor for correlating to the SSE stream (FR-023).
          content: { application/json: { schema: { $ref: '#/components/schemas/Job' } } }
        '404': { $ref: '#/components/responses/NotFound' }         # repo not in registry (FR-011/020)
        '409':
          description: A job is already active for this repo (FR-022). Not used for lock contention.
          content: { application/json: { schema: { $ref: '#/components/schemas/ErrorEnvelope' } } }
    get:
      tags: [jobs]
      summary: Latest job state for the repo (terminal outcome readable after finish, FR-024).
      parameters: [ { $ref: '#/components/parameters/RepoId' } ]
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Job' } } } }
        '404': { $ref: '#/components/responses/NotFound' }         # registered-repo-with-no-job OR unknown/malformed repo => not_found (details.resource: repo), deliberately indistinguishable (FR-024/011)
  /api/reindex/{repo}/events:
    get:
      tags: [jobs]
      summary: Per-repo SSE progress stream — snapshot, then progress, then one terminal event (FR-023).
      parameters: [ { $ref: '#/components/parameters/RepoId' } ]
      responses:
        '200':
          description: >
            text/event-stream. Named events: `snapshot` (every connect),
            `progress` ({ phase, current, total, currentFile? }), terminal
            `done`/`error`. A `:`-prefixed comment heartbeat (~15s, ignored by
            EventSource) keeps quiet jobs alive; under a slow consumer `progress`
            frames coalesce to the latest (bounded memory) while `snapshot` and
            the terminal event are always delivered. A client connecting to an
            already-finished job receives one `snapshot` event carrying the
            terminal status, then the stream closes — no separate `done`/`error`
            event follows (the terminal state is collapsed into the snapshot).
            Multiple concurrent subscribers each snapshot independently, and one
            slow/disconnected subscriber never stalls the job or the others. No
            Last-Event-ID replay. Disconnect never cancels the job.
          headers:
            Cache-Control:
              description: No caching of the live stream.
              schema: { type: string, enum: ['no-cache'] }
            Connection:
              description: HTTP/1.1 keep-alive for the long-lived stream.
              schema: { type: string, enum: ['keep-alive'] }
            X-Accel-Buffering:
              description: Disables reverse-proxy (e.g. nginx) response buffering so events are not batched or withheld.
              schema: { type: string, enum: ['no'] }
          content:
            text/event-stream:
              schema: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }         # registered-repo-with-no-job OR unknown/malformed repo => not_found (details.resource: repo), deliberately indistinguishable (FR-024/011)
