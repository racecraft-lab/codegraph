name: CodeGraph PR Impact

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  pr-impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: ./actions/pr-impact
        with:
          codegraph-version: "1.4.1"
          fail-on-callers: ""
          fail-on-hubs: "false"
          narrative: "off"
