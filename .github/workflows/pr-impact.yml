name: CodeGraph PR Impact

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: read

jobs:
  pr-impact:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - run: npm ci

      - run: npm run build

      - uses: ./actions/pr-impact
        with:
          codegraph-version: "file:."
          fail-on-callers: ""
          fail-on-hubs: "false"
          narrative: "off"
