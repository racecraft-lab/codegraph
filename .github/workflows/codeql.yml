# Static security analysis via GitHub code scanning (free for public repos).
# Findings land in the repo's Security tab and as PR check annotations.
name: CodeQL

on:
  push:
    branches: [main]
  # Unfiltered so stacked PRs (base = another feature branch) are scanned too.
  pull_request:
  schedule:
    - cron: '26 6 * * 1' # weekly, Monday 06:26 UTC

permissions:
  contents: read

jobs:
  analyze:
    name: analyze (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write # upload findings to code scanning
    steps:
      - name: Check out
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: javascript-typescript
          build-mode: none
          queries: security-extended

      - name: Analyze
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: '/language:javascript-typescript'
