# Project-scoped Codex CLI config (read in trusted projects only) — CodeGraph dogfooding.
# The MCP server runs the LOCAL build so Codex sessions exercise HEAD:
# run `npm run build` and `node dist/bin/codegraph.js init .` once per clone.
# The server starts through scripts/mcp-dogfood.mjs — a cross-platform Node
# launcher (no POSIX sh, so Windows dogfood clones work too) reached via a tiny
# `node -e` walk-up locator that finds the checkout root from any cwd inside
# the repo. The launcher applies the untracked .envrc.local to the daemon's
# environment (spec worktrees fall back to the main checkout's copy) so
# daemons carry the dogfood embedding env.

[mcp_servers.codegraph]
command = "node"
args = ["-e", "let d=process.cwd();const p=require(`path`),f=require(`fs`);while(!f.existsSync(p.join(d,`scripts`,`mcp-dogfood.mjs`))&&d!==p.dirname(d))d=p.dirname(d);const s=p.join(d,`scripts`,`mcp-dogfood.mjs`);if(!f.existsSync(s)){console.error(`mcp-dogfood.mjs not found above `+process.cwd());process.exit(1)}import(require(`url`).pathToFileURL(s).href)"]
startup_timeout_sec = 30
