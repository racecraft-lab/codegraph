name: CodeGraph PR Impact
description: Publish a deterministic CodeGraph blast-radius report for pull requests.

inputs:
  codegraph-version:
    description: Reproducible @colbymchenry/codegraph CLI/runtime version used for analysis.
    required: false
    default: "1.5.0"
  base-ref:
    description: Comparison target for detect-changes --mode base-ref.
    required: false
    default: ""
  fail-on-callers:
    description: Optional integer caller threshold. Empty means advisory.
    required: false
    default: ""
  fail-on-hubs:
    description: Whether hub threshold breaches should fail the action.
    required: false
    default: "false"
  caller-depth:
    description: Caller traversal depth.
    required: false
    default: "1"
  max-callers:
    description: Maximum caller rows.
    required: false
    default: "20"
  narrative:
    description: Optional prose narrative mode. Use off or trusted.
    required: false
    default: "off"

outputs:
  summary-status:
    description: Detector summary status.
    value: ${{ steps.pr-impact.outputs.summary-status }}
  detector-exit-code:
    description: Raw detector exit code captured by the helper.
    value: ${{ steps.pr-impact.outputs.detector-exit-code }}
  conclusion:
    description: Final action conclusion after SPEC-020 policy mapping.
    value: ${{ steps.pr-impact.outputs.conclusion }}
  threshold-breached:
    description: Whether configured policy was breached.
    value: ${{ steps.pr-impact.outputs.threshold-breached }}
  cache-status:
    description: Cache path taken before analysis.
    value: ${{ steps.pr-impact.outputs.cache-status }}
  delivery-status:
    description: Durable delivery path.
    value: ${{ steps.pr-impact.outputs.delivery-status }}
  comment-url:
    description: Current action-owned comment when available.
    value: ${{ steps.pr-impact.outputs.comment-url }}
  report-path:
    description: Deterministic markdown report path.
    value: ${{ steps.pr-impact.outputs.report-path }}
  artifact-name:
    description: Uploaded report artifact name.
    value: ${{ steps.pr-impact.outputs.artifact-name }}
  narrative-status:
    description: Optional narrative outcome.
    value: ${{ steps.pr-impact.outputs.narrative-status }}
  codegraph-version:
    description: Resolved CodeGraph runtime version.
    value: ${{ steps.pr-impact.outputs.codegraph-version }}
  helper-version:
    description: Resolved action helper version.
    value: ${{ steps.pr-impact.outputs.helper-version }}

runs:
  using: composite
  steps:
    - name: Install CodeGraph CLI
      id: install-codegraph
      shell: bash
      env:
        INPUT_CODEGRAPH_VERSION: ${{ inputs.codegraph-version }}
      run: |
        codegraph_spec="$INPUT_CODEGRAPH_VERSION"
        if [[ ! "$codegraph_spec" =~ ^[A-Za-z0-9._~:/@+-]+$ ]]; then
          echo "Unsupported codegraph-version package spec" >&2
          exit 1
        fi
        npm install --global "@colbymchenry/codegraph@$codegraph_spec"
        codegraph_bin="$(npm prefix --global)/bin/codegraph"
        if [[ ! -x "$codegraph_bin" ]]; then
          codegraph_bin="$(command -v codegraph || true)"
        fi
        if [[ -z "$codegraph_bin" ]]; then
          echo "Unable to resolve installed codegraph binary" >&2
          exit 1
        fi
        codegraph_version="$("$codegraph_bin" --version)"
        if [[ -z "$codegraph_version" ]]; then
          echo "Unable to resolve installed codegraph version" >&2
          exit 1
        fi
        echo "PR_IMPACT_CODEGRAPH_BIN=$codegraph_bin" >> "$GITHUB_ENV"
        echo "PR_IMPACT_CODEGRAPH_RESOLVED_VERSION=$codegraph_version" >> "$GITHUB_ENV"
        echo "codegraph-version=$codegraph_version" >> "$GITHUB_OUTPUT"

    - name: Restore CodeGraph index cache
      id: codegraph-cache
      uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: .codegraph
        key: codegraph-${{ runner.os }}-${{ github.repository }}-${{ github.event.pull_request.base.sha || github.sha }}-${{ github.event.pull_request.head.sha || github.sha }}-${{ steps.install-codegraph.outputs.codegraph-version }}
        restore-keys: |
          codegraph-${{ runner.os }}-${{ github.repository }}-${{ github.event.pull_request.base.sha || github.sha }}-${{ github.event.pull_request.head.sha || github.sha }}-${{ steps.install-codegraph.outputs.codegraph-version }}-
          codegraph-${{ runner.os }}-${{ github.repository }}-

    - name: Run PR impact helper
      id: pr-impact
      shell: bash
      env:
        INPUT_CODEGRAPH_VERSION: ${{ inputs.codegraph-version }}
        INPUT_BASE_REF: ${{ inputs.base-ref }}
        INPUT_FAIL_ON_CALLERS: ${{ inputs.fail-on-callers }}
        INPUT_FAIL_ON_HUBS: ${{ inputs.fail-on-hubs }}
        INPUT_CALLER_DEPTH: ${{ inputs.caller-depth }}
        INPUT_MAX_CALLERS: ${{ inputs.max-callers }}
        INPUT_NARRATIVE: ${{ inputs.narrative }}
        PR_IMPACT_CACHE_RESTORE_HIT: ${{ steps.codegraph-cache.outputs.cache-hit == 'true' && 'true' || 'false' }}
        PR_IMPACT_CODEGRAPH_RESOLVED_VERSION: ${{ steps.install-codegraph.outputs.codegraph-version }}
        PR_IMPACT_PREPARE_BASE_INDEX: "true"
        PR_IMPACT_VALIDATE_HEAD: "true"
        PR_IMPACT_TRUSTED_CONTEXT: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' && 'true' || 'false' }}
        PR_IMPACT_TOKEN_WRITE: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]' && 'true' || 'false' }}
        GITHUB_TOKEN: ${{ github.token }}
      run: node "${{ github.action_path }}/dist/run.mjs"

    - name: Upload PR impact report
      if: always() && steps.pr-impact.outputs.report-path != ''
      uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
      with:
        name: ${{ steps.pr-impact.outputs.artifact-name }}
        path: ${{ steps.pr-impact.outputs.report-path }}
        if-no-files-found: error

    - name: Save CodeGraph index cache
      if: always() && steps.pr-impact.outputs.cache-status == 'rebuilt'
      uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: .codegraph
        key: codegraph-${{ runner.os }}-${{ github.repository }}-${{ github.event.pull_request.base.sha || github.sha }}-${{ github.event.pull_request.head.sha || github.sha }}-${{ steps.install-codegraph.outputs.codegraph-version }}-${{ github.run_id }}-${{ github.run_attempt }}

    - name: Enforce PR impact conclusion
      if: always() && steps.pr-impact.outputs.conclusion != 'pass'
      shell: bash
      run: |
        echo "CodeGraph PR impact conclusion: ${{ steps.pr-impact.outputs.conclusion }}" >&2
        exit 1
